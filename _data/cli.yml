version: v1.5.2
usage: |
    Usage:
      git flutter [command]

    Available Commands:
      feature        Create a feature branch for your work.
      help           Help about any command
      hotfix         Create a hotfix branch based on the config file
      init           init commands
      release        release command
      status         Displays the status of the current repo
      sync           Syncs the current branch (if needed)
      tag            tag command

    Flags:
          --cache string       application cache file (default "./.cache.v8")
          --no-check-version   Doesn't check for updated version
      -v, --verbose            verbose log output

    Use "git flutter [command] --help" for more information about a command.
commands:
    feature:
        usage: |
            Usage:
              git flutter feature name [flags]

            Examples:
            $ git flutter feature my-feat-name
            $ git flutter feature my-feat-name --team ppb

            Flags:
              -s, --source string   working directory (default ".")
                  --team string     team name
              -y, --yes             confirm yes to any interactive prompts

            Global Flags:
                  --cache string       application cache file (default "./.cache.v8")
                  --no-check-version   Doesn't check for updated version
              -v, --verbose            verbose log output
    help:
        usage: |
            Usage:
              git flutter help [command] [flags]

            Global Flags:
                  --cache string       application cache file (default "./.cache.v8")
                  --no-check-version   Doesn't check for updated version
              -v, --verbose            verbose log output
    hotfix:
        usage: |
            Usage:
              git flutter hotfix name [flags]

            Flags:
              -s, --source string   working directory (default ".")
              -y, --yes             confirm yes to any interactive prompts

            Global Flags:
                  --cache string       application cache file (default "./.cache.v8")
                  --no-check-version   Doesn't check for updated version
              -v, --verbose            verbose log output
    init:
        usage: |
            Usage:
              git flutter init [command]

            Available Commands:
              gitflow     gitflow command

            Global Flags:
                  --cache string       application cache file (default "./.cache.v8")
                  --no-check-version   Doesn't check for updated version
              -v, --verbose            verbose log output

            Use "git flutter init [command] --help" for more information about a command.
    release:
        usage: |
            Usage:
              git flutter release {name | --cancel} [flags]

            Examples:
            $ git flutter release v1.0.0
            $ git flutter release --cancel

            Flags:
                  --cancel          cancel the release
              -s, --source string   working directory (default ".")
                  --team string     team name
              -y, --yes             confirm yes to any interactive prompts

            Global Flags:
                  --cache string       application cache file (default "./.cache.v8")
                  --no-check-version   Doesn't check for updated version
              -v, --verbose            verbose log output
    status:
        usage: |
            Usage:
              git flutter status [flags]

            Flags:
              -s, --source string   working directory (default ".")

            Global Flags:
                  --cache string       application cache file (default "./.cache.v8")
                  --no-check-version   Doesn't check for updated version
              -v, --verbose            verbose log output
    sync:
        usage: |
            Usage:
              git flutter sync [flags]

            Flags:
                  --force           override any warnings to continue if possible
              -s, --source string   working directory (default ".")
              -y, --yes             confirm yes to any interactive prompts

            Global Flags:
                  --cache string       application cache file (default "./.cache.v8")
                  --no-check-version   Doesn't check for updated version
              -v, --verbose            verbose log output
    tag:
        usage: |
            Usage:
              git flutter tag {major | minor | patch | integration | <newversion>} [flags]

            Examples:
            $ git flutter tag patch
            $ git flutter tag 1.0.0

            Flags:
              -m, --message string   custom annotated tag commit message
                  --push             push to the remote
              -s, --source string    working directory (default ".")
                  --team string      team name
              -y, --yes              confirm yes to any interactive prompts

            Global Flags:
                  --cache string       application cache file (default "./.cache.v8")
                  --no-check-version   Doesn't check for updated version
              -v, --verbose            verbose log output
examples:
    - title: Start a Feature
      description: Two teams (ppb and fd) are working with the parallel teams SDLC. As a FanDuel (fd) engineer I want to start a new feature. I use the feature command to create a feature branch, with my team automatically detected from my current branch of fd/develop.
      output: |-
        $ git flutter feature my-new-thing --yes --no-check-version
        ✔ The feature branch 'fd/feature/my-new-thing' was successfully created
      topics:
        - feature
        - gitflow
    - title: Develop Branches Ahead
      description: Two teams (ppb and fd) are working with the parallel teams SDLC with both teams having merged several features into their develop branches. The status command shows the state and tags of the key repository branches alongside my current feature branch.
      output: |-
        $ git flutter status --no-check-version
        main v1.3.2
        ppb/develop v1.4.0-ppb.alpha.3
          3 ahead of main
        fd/develop v1.4.0-fd.alpha.5
          5 ahead of main
        (current) fd/feature/my-new-thing
      topics:
        - status
        - gitflow
    - title: Start a Release
      description: Two teams (ppb and fd) are working with the parallel teams SDLC with both teams having merged several features into their develop branches. As a FanDuel (fd) engineer I can use the release command to start a release.
      output: |-
        $ git flutter release 1.4 --yes --no-check-version
        ✔ The release branch 'fd/release/1.4' was created
      topics:
        - release
        - gitflow
    - title: Specify Exact SemVer Tag
      description: I want to tag a release branch and specify the full semver tag required.
      output: |-
        $ git flutter tag 1.4.0-fd.beta.0 --push --yes --no-check-version
        ✔ The 'v1.4.0-fd.beta.0' version tag was created
        ✔ The 'v1.4.0-fd.beta.0' version pushed to remote
      topics:
        - tag
        - gitflow
    - title: Concurrent Releases Prevented
      description: Two teams (ppb and fd) are working with the parallel teams SDLC. FanDuel (fd) have a release in progress so as a PPB engineer I am prevented from starting another release until that release is completed or cancelled.
      output: |-
        $ git flutter release a-named-release --yes --no-check-version
        An ERROR occurred:

        ✘ there is 1 active release(s): 'fd/release/1.4'

        Command help is available using the --help flag.
        Support is available in Slack channel #inner-source.
      topics:
        - release
        - gitflow
    - title: Release In QA
      description: Two teams (ppb and fd) are working with the parallel teams SDLC. The FanDuel (fd) team started a release which is currently being tested. The status command shows the active release.
      output: |-
        $ git flutter status --no-check-version
        (current) main v1.3.2
        ppb/develop v1.4.0-ppb.alpha.3
          3 ahead of main
        fd/develop v1.4.0-fd.alpha.5
          5 ahead of main
        fd/release/1.4 v1.4.0-fd.beta.0
          5 ahead of main
      topics:
        - status
        - gitflow
    - title: Release Merged
      description: Two teams (ppb and fd) are working with the parallel teams SDLC. The FanDuel (fd) team have just completed a release by merging to main. The status command shows how the develop branches now lag behind main and require a sync.
      output: |-
        $ git flutter status --no-check-version
        (current) main v1.4.0
        ppb/develop v1.4.0-ppb.alpha.3
          !! 6 behind and 3 ahead of main
        fd/develop v1.4.0-fd.alpha.5
          !! 1 behind main
      topics:
        - status
        - gitflow
    - title: Increment from Previous SemVer
      description: After merging a release branch into main, I use the tag command to create a new minor release tag by incrementing the previous semver tag.
      output: |-
        $ git flutter tag minor --push --yes --no-check-version
        ✔ The 'v1.5.0' version tag was created
        ✔ The 'v1.5.0' version pushed to remote
      topics:
        - tag
        - gitflow
    - title: Sync a Develop Branch
      description: Two teams (ppb and fd) are working with the parallel teams SDLC. The FanDuel (fd) team have just completed a release by merging to main. As a PPB engineer I need to sync the release back into my develop branch.
      output: |-
        $ git flutter sync --force --yes --no-check-version
        This will merge main into ppb/develop and push to origin.
        ✔ Merged and pushed, all now up to date.
      topics:
        - sync
        - gitflow
