on:
  workflow_dispatch:

jobs:
  git-sync:
    runs-on: ubuntu-latest
    name: Sync external doc site
    environment: prod
    steps:
      - name: Retrieve the Flutter Tech app token
        id: flutter_tech_app
        uses: Flutter-Tech/github-app-token@6975143c1cf1a5c6cb1823d532778402d3608505
        with:
          APP_PEM: ${{ secrets.FLUTTER_TECH_PEM }}
          APP_ID: 115232
          APP_INSTALLATION_ID: 16910369

      - name: Clone FG docs site
        uses: actions/checkout@v2

      - name: Push to FT
        env:
          DESTINATION: "https://${{ steps.flutter_tech_app.outputs.app_token }}:x-oauth-basic@github.com/Flutter-Tech/fsc-docs-site.git"
        run: |
          git config -l | grep 'http\..*\.extraheader' | cut -d= -f1 | xargs -L1 git config --unset-all
          git remote add destination $DESTINATION
          git push destination "main:main" -f
