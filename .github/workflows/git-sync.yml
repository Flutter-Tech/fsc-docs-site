# .github/workflows/git-sync.yml

on:
   workflow_dispatch:

jobs:
  git-sync:
    runs-on: ubuntu-latest
    name: Sync external doc site
    environment: prod
    steps:
      - name: Retrieve the Flutter Global app token
        id: flutter_global_app
        uses: Flutter-Tech/github-app-token@v1
        with:
          APP_PEM: ${{ secrets.FLUTTER_GLOBAL_PEM }}
          APP_ID: 115213
          APP_INSTALLATION_ID: 16908128

      - name: Retrieve the Flutter Tech app token
        id: flutter_tech_app
        uses: Flutter-Tech/github-app-token@v1
        with:
          APP_PEM: ${{ secrets.FLUTTER_TECH_PEM }}
          APP_ID: 115232
          APP_INSTALLATION_ID: 16910369

      - name: git-sync
        uses: wei/git-sync@v3
        with:
          source_repo: "https://${{ steps.flutter_global_app.outputs.app_token }}:x-oauth-basic@github.com/Flutter-Global/fsc-docs-site.git"
          source_branch: "main"
          destination_repo: "https://${{ steps.flutter_tech_app.outputs.app_token }}:x-oauth-basic@github.com/Flutter-Tech/sync-site-demo.git"
          destination_branch: "main"
