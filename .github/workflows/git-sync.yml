# .github/workflows/git-sync.yml

on:
   workflow_dispatch:

jobs:
  git-sync:
    runs-on: ubuntu-latest
    name: Sync External Doc Site
    environment: prod
    steps:
      - name: git-sync
        uses: wei/git-sync@v3
        with:
          source_repo: "https://${{ secrets.TIAGO_TOKEN }}:x-oauth-basic@github.com/Flutter-Global/fsc-docs-site.git"
          source_branch: "main"
          destination_repo: "https://${{ secrets.TIAGO_TOKEN }}:x-oauth-basic@github.com/Flutter-Tech/sync-site-demo.git"
          destination_branch: "main"
